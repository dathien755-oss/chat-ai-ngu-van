<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat AI Ngữ văn</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6fb;
      padding: 20px;
    }

    .box {
      max-width: 720px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      color: #1a73e8;
    }

    #messages {
      border: 1px solid #ddd;
      height: 380px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      white-space: pre-wrap;
    }

    .msg {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      line-height: 1.5;
    }

    .user {
      background: #e3f2fd;
    }

    .bot {
      background: #f1f3f4;
    }

    textarea {
      width: 100%;
      height: 90px;
      border-radius: 8px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 16px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Trợ lý AI Ngữ văn</h2>

  <div id="messages"></div>

  <textarea id="msg" placeholder="Ví dụ: Lập dàn ý bài Vội vàng của Xuân Diệu"></textarea>

  <button onclick="send()">Gửi</button>

  <div class="hint">
    Gợi ý: lập dàn ý, phân tích tác phẩm, nhận xét đoạn văn...
  </div>
</div>

<script>
  function add(text, type = "bot") {
    let box = document.getElementById("messages");
    let div = document.createElement("div");

    div.className = "msg " + type;
    div.textContent = text;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  async function send() {
    let input = document.getElementById("msg");
    let text = input.value.trim();

    if (!text) return;

    add("Bạn: " + text, "user");
    input.value = "";

    add("AI đang trả lời...", "bot");

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      let box = document.getElementById("messages");
      box.removeChild(box.lastChild);

      if (data.reply) {
        add("AI: " + data.reply, "bot");
      } else {
        add("AI lỗi: " + (data.error || "Không rõ lỗi"), "bot");
      }

    } catch (err) {
      let box = document.getElementById("messages");
      box.removeChild(box.lastChild);
      add("AI lỗi kết nối", "bot");
    }
  }
</script>

</body>
</html>
